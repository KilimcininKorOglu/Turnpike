version: 2

before:
  hooks:
    - >
      apt-get update && apt-get install -y --no-install-recommends
      pkg-config
      libgl-dev
      libx11-dev
      libxcursor-dev
      libxrandr-dev
      libxinerama-dev
      libxi-dev
      libxxf86vm-dev

builds:
  - id: linux-amd64
    main: ./cmd/turnpike/
    binary: turnpike
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
      - CC=x86_64-linux-gnu-gcc
      - CXX=x86_64-linux-gnu-g++
    flags: [-trimpath]
    ldflags:
      - -s -w -X 'github.com/KilimcininKorOglu/Turnpike/internal/cli.AppVersion={{.Version}}'

  - id: linux-arm64
    main: ./cmd/turnpike/
    binary: turnpike
    goos: [linux]
    goarch: [arm64]
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    flags: [-trimpath]
    ldflags:
      - -s -w -X 'github.com/KilimcininKorOglu/Turnpike/internal/cli.AppVersion={{.Version}}'

  - id: darwin-amd64
    main: ./cmd/turnpike/
    binary: turnpike
    goos: [darwin]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
      - CC=o64-clang
      - CXX=o64-clang++
    flags: [-trimpath]
    ldflags:
      - -s -w -X 'github.com/KilimcininKorOglu/Turnpike/internal/cli.AppVersion={{.Version}}'

  - id: darwin-arm64
    main: ./cmd/turnpike/
    binary: turnpike
    goos: [darwin]
    goarch: [arm64]
    env:
      - CGO_ENABLED=1
      - CC=oa64-clang
      - CXX=oa64-clang++
    flags: [-trimpath]
    ldflags:
      - -s -w -X 'github.com/KilimcininKorOglu/Turnpike/internal/cli.AppVersion={{.Version}}'

  - id: windows-amd64
    main: ./cmd/turnpike/
    binary: turnpike
    goos: [windows]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
      - CC=x86_64-w64-mingw32-gcc
      - CXX=x86_64-w64-mingw32-g++
    flags: [-trimpath]
    ldflags:
      - -s -w -X 'github.com/KilimcininKorOglu/Turnpike/internal/cli.AppVersion={{.Version}}'

  - id: windows-arm64
    main: ./cmd/turnpike/
    binary: turnpike
    goos: [windows]
    goarch: [arm64]
    env:
      - CGO_ENABLED=1
      - CC=/llvm-mingw/bin/aarch64-w64-mingw32-gcc
      - CXX=/llvm-mingw/bin/aarch64-w64-mingw32-g++
    flags: [-trimpath]
    ldflags:
      - -s -w -X 'github.com/KilimcininKorOglu/Turnpike/internal/cli.AppVersion={{.Version}}'

archives:
  - id: turnpike
    format: tar.gz
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - README_EN.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
