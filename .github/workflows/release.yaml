name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.22.0'
          cache: true
      - name: Install Fyne dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          libgl-dev
          libx11-dev
          libxcursor-dev
          libxrandr-dev
          libxinerama-dev
          libxi-dev
          libxxf86vm-dev
      - name: Run tests
        run: make test

  goreleaser:
    needs: test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/goreleaser/goreleaser-cross:v1.22
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git config --global --add safe.directory /__w/Turnpike/Turnpike
      - run: git fetch --force --tags
      - name: Release
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
